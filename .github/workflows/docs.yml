name: CI Build
on:
  push:
    branches:
      - main
  schedule:
    # Daily at 00:05 UTC — promotes any drafts whose date has arrived.
    - cron: '5 0 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: python3 main.py
      - run: zensical build --clean
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.WWW_SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 129.121.91.205 >> ~/.ssh/known_hosts
      - name: Deploy to nginx VPS
        run: |
          rsync -av --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            site/ live@129.121.91.205:/var/www/www.radiusred.uk/
