<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">IBS Mean-Reversion: Discovery vs Validation Sharpe</title>
  <desc id="desc">Grouped bar chart showing IBS strategy Discovery Sharpe (2.65 on DAX, 1.44 on EURUSD) compared to Validation Sharpe (negative on both). The acceptance threshold of 1.5 is shown as a dashed green line.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <style>
      .chart-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .axis-label  { font: 500 13px Arial, Helvetica, sans-serif; fill: #6b7280; }
      .group-label { font: 700 14px Arial, Helvetica, sans-serif; fill: #111827; }
      .bar-label   { font: 600 12px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .bar-label-neg { font: 600 12px Arial, Helvetica, sans-serif; fill: #374151; }
      .legend-text { font: 500 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .threshold-label { font: 600 11px Arial, Helvetica, sans-serif; fill: #16a34a; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .zero-line { stroke: #374151; stroke-width: 1.5; }
      .threshold-line { stroke: #16a34a; stroke-width: 1.5; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <rect width="900" height="460" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="450" y="38" class="chart-title" text-anchor="middle">IBS Mean-Reversion: Discovery vs Validation Sharpe</text>

  <!-- Chart area: x=140..820, y=65..385 (height=320, width=680) -->
  <!-- Y range: -1.5 to 3.0 (4.5 units), scale = 320/4.5 = 71.1px per unit -->
  <!-- Zero line: y = 65 + 3.0*71.1 = 65 + 213.3 = 278 -->

  <!-- Grid lines (at Sharpe 3, 2, 1, 0, -1) -->
  <line x1="140" y1="65"  x2="820" y2="65"  class="grid"/>
  <line x1="140" y1="136" x2="820" y2="136" class="grid"/>
  <line x1="140" y1="207" x2="820" y2="207" class="grid"/>
  <line x1="140" y1="349" x2="820" y2="349" class="grid"/>

  <!-- Y axis labels -->
  <text x="130" y="70"  class="axis-label" text-anchor="end">3.0</text>
  <text x="130" y="141" class="axis-label" text-anchor="end">2.0</text>
  <text x="130" y="212" class="axis-label" text-anchor="end">1.0</text>
  <text x="130" y="283" class="axis-label" text-anchor="end">0</text>
  <text x="130" y="354" class="axis-label" text-anchor="end">-1.0</text>

  <!-- Zero line -->
  <line x1="140" y1="278" x2="820" y2="278" class="zero-line"/>

  <!-- Acceptance threshold at Sharpe = 1.5 -->
  <!-- y = 65 + (3.0-1.5)*71.1 = 65 + 106.7 = 172 -->
  <line x1="140" y1="172" x2="820" y2="172" class="threshold-line"/>
  <text x="825" y="176" class="threshold-label">1.5 target</text>

  <!-- === GROUP 1: DAX === -->
  <!-- Center x = 310 -->

  <!-- DAX Discovery bar: Sharpe 2.65 -->
  <!-- top = 65 + (3.0-2.65)*71.1 = 65 + 24.9 = 90 -->
  <!-- height = 2.65 * 71.1 = 188 -->
  <rect x="230" y="90" width="80" height="188" fill="#3b82f6" rx="3"/>
  <text x="270" y="145" class="bar-label" text-anchor="middle">2.65</text>

  <!-- DAX Validation bar: Sharpe -0.62 -->
  <!-- top = 278 (zero line), height = 0.62 * 71.1 = 44 -->
  <rect x="320" y="278" width="80" height="44" fill="#ef4444" rx="3"/>
  <text x="360" y="312" class="bar-label-neg" text-anchor="middle">-0.62</text>

  <!-- DAX group label -->
  <text x="305" y="415" class="group-label" text-anchor="middle">DAX</text>

  <!-- === GROUP 2: EURUSD === -->
  <!-- Center x = 590 -->

  <!-- EURUSD Discovery bar: Sharpe 1.44 -->
  <!-- top = 65 + (3.0-1.44)*71.1 = 65 + 110.9 = 176 -->
  <!-- height = 1.44 * 71.1 = 102 -->
  <rect x="510" y="176" width="80" height="102" fill="#3b82f6" rx="3"/>
  <text x="550" y="232" class="bar-label" text-anchor="middle">1.44</text>

  <!-- EURUSD Validation bar: Sharpe approx -0.85 -->
  <!-- height = 0.85 * 71.1 = 60 -->
  <rect x="600" y="278" width="80" height="60" fill="#ef4444" rx="3"/>
  <text x="640" y="318" class="bar-label-neg" text-anchor="middle">negative</text>

  <!-- EURUSD group label -->
  <text x="585" y="415" class="group-label" text-anchor="middle">EURUSD</text>

  <!-- Legend -->
  <rect x="200" y="430" width="16" height="16" fill="#3b82f6" rx="2"/>
  <text x="222" y="443" class="legend-text">Discovery (2021–2023)</text>
  <rect x="440" y="430" width="16" height="16" fill="#ef4444" rx="2"/>
  <text x="462" y="443" class="legend-text">Validation (2020–2026)</text>

  <!-- Note about USA500/USDJPY -->
  <text x="450" y="456" class="axis-label" text-anchor="middle" font-size="11">USA500 and USDJPY: all parameter combinations negative in discovery — not shown</text>
</svg>
