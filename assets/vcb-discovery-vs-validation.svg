<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-labelledby="title desc">
  <title id="title">VCB Strategy: Discovery vs Validation Sharpe Ratio</title>
  <desc id="desc">Grouped bar chart showing VCB strategy Discovery Sharpe (3.47 on DAX, 2.03 on EURUSD, 2.06 on USA500) compared to Validation Sharpe (negative on all three). The acceptance threshold of 1.5 is shown as a dashed green line.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <style>
      .chart-title  { font: 700 17px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .axis-label   { font: 500 12px Arial, Helvetica, sans-serif; fill: #6b7280; }
      .group-label  { font: 700 13px Arial, Helvetica, sans-serif; fill: #111827; }
      .bar-label    { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .bar-label-neg { font: 600 11px Arial, Helvetica, sans-serif; fill: #374151; }
      .legend-text  { font: 500 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .threshold-label { font: 600 11px Arial, Helvetica, sans-serif; fill: #16a34a; }
      .grid        { stroke: #e5e7eb; stroke-width: 1; }
      .zero-line   { stroke: #374151; stroke-width: 1.5; }
      .threshold-line { stroke: #16a34a; stroke-width: 1.5; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <rect width="900" height="480" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" class="chart-title" text-anchor="middle">VCB Strategy: Discovery vs Validation Sharpe</text>
  <text x="450" y="54" class="axis-label" text-anchor="middle">Extended discovery window 2021–2025 · Validation window 2020–2025</text>

  <!-- Chart area: x=120..860, y=70..380 (height=310, width=740) -->
  <!-- Y range: -1.5 to 4.0 (5.5 units), scale = 310/5.5 = 56.4px per unit -->
  <!-- Zero line: y = 70 + 4.0*56.4 = 70 + 225.6 = 296 -->

  <!-- Grid lines (at 4, 3, 2, 1, 0, -1) -->
  <line x1="120" y1="70"  x2="860" y2="70"  class="grid"/>
  <line x1="120" y1="126" x2="860" y2="126" class="grid"/>
  <line x1="120" y1="183" x2="860" y2="183" class="grid"/>
  <line x1="120" y1="239" x2="860" y2="239" class="grid"/>
  <line x1="120" y1="352" x2="860" y2="352" class="grid"/>

  <!-- Y axis labels -->
  <text x="112" y="75"  class="axis-label" text-anchor="end">4.0</text>
  <text x="112" y="131" class="axis-label" text-anchor="end">3.0</text>
  <text x="112" y="188" class="axis-label" text-anchor="end">2.0</text>
  <text x="112" y="244" class="axis-label" text-anchor="end">1.0</text>
  <text x="112" y="301" class="axis-label" text-anchor="end">0</text>
  <text x="112" y="357" class="axis-label" text-anchor="end">-1.0</text>

  <!-- Zero line: y = 296 -->
  <line x1="120" y1="296" x2="860" y2="296" class="zero-line"/>

  <!-- Acceptance threshold at Sharpe = 1.5: y = 70 + (4.0-1.5)*56.4 = 70 + 141 = 211 -->
  <line x1="120" y1="211" x2="860" y2="211" class="threshold-line"/>
  <text x="866" y="215" class="threshold-label">1.5</text>

  <!-- === GROUP 1: DAX === center x=220 -->

  <!-- DAX Discovery: Sharpe 3.47 -->
  <!-- top = 70 + (4.0-3.47)*56.4 = 70 + 29.9 = 100 -->
  <!-- height = 3.47*56.4 = 195.6 ≈ 196 -->
  <rect x="155" y="100" width="76" height="196" fill="#3b82f6" rx="3"/>
  <text x="193" y="155" class="bar-label" text-anchor="middle">3.47</text>

  <!-- DAX Validation: Sharpe -0.58 -->
  <!-- height = 0.58*56.4 = 32.7 ≈ 33 -->
  <rect x="241" y="296" width="76" height="33" fill="#ef4444" rx="3"/>
  <text x="279" y="323" class="bar-label-neg" text-anchor="middle">-0.58</text>

  <text x="218" y="418" class="group-label" text-anchor="middle">DAX</text>

  <!-- === GROUP 2: EURUSD === center x=460 -->

  <!-- EURUSD Discovery: Sharpe 2.03 -->
  <!-- top = 70 + (4.0-2.03)*56.4 = 70 + 111.1 = 181 -->
  <!-- height = 2.03*56.4 = 114.5 ≈ 115 -->
  <rect x="395" y="181" width="76" height="115" fill="#3b82f6" rx="3"/>
  <text x="433" y="238" class="bar-label" text-anchor="middle">2.03</text>

  <!-- EURUSD Validation: Sharpe -1.16 -->
  <!-- height = 1.16*56.4 = 65.4 ≈ 65 -->
  <rect x="481" y="296" width="76" height="65" fill="#ef4444" rx="3"/>
  <text x="519" y="338" class="bar-label-neg" text-anchor="middle">-1.16</text>

  <text x="458" y="418" class="group-label" text-anchor="middle">EURUSD</text>

  <!-- === GROUP 3: USA500 === center x=700 -->

  <!-- USA500 Discovery: Sharpe 2.06 -->
  <!-- top = 70 + (4.0-2.06)*56.4 = 70 + 109.4 = 179 -->
  <!-- height = 2.06*56.4 = 116.2 ≈ 116 -->
  <rect x="635" y="179" width="76" height="117" fill="#3b82f6" rx="3"/>
  <text x="673" y="237" class="bar-label" text-anchor="middle">2.06</text>

  <!-- USA500 Validation: negative (exact figure not published) -->
  <rect x="721" y="296" width="76" height="50" fill="#ef4444" rx="3"/>
  <text x="759" y="330" class="bar-label-neg" text-anchor="middle">negative</text>

  <text x="698" y="418" class="group-label" text-anchor="middle">USA500</text>

  <!-- Legend -->
  <rect x="230" y="438" width="16" height="14" fill="#3b82f6" rx="2"/>
  <text x="252" y="450" class="legend-text">Discovery (2021–2025 extended window)</text>
  <rect x="550" y="438" width="16" height="14" fill="#ef4444" rx="2"/>
  <text x="572" y="450" class="legend-text">Validation (2020–2025 full window)</text>
</svg>
